<!-- FORGOT PASSWORD PAGE -->
  <div id="page-forgot" class="view" style="width:100%">
    <div style="display:flex;align-items:center;justify-content:center;min-height:100vh">
      <div class="auth-card">
        <div class="auth-logo">
          <div class="auth-logo-icon"><span class="material-icons" style="font-size:20px">hub</span></div>
          <span class="auth-logo-text">CRM System</span>
        </div>
        <h1 class="auth-title">Forgot password?</h1>
        <p class="auth-subtitle">Enter your email and we'll send a reset link</p>

        <div class="mat-form-field">
          <label>Email address</label>
          <div class="mat-input-wrap">
            <span class="material-icons mat-icon">email</span>
            <input type="email" placeholder="you@company.com" />
          </div>
        </div>
        <button class="mat-btn mat-btn-primary mat-btn-full" onclick="showToast('Reset link sent! Check your inbox.','success')">
          <span class="material-icons">send</span> Send Reset Link
        </button>
        <div class="auth-footer">
          <a href="#" onclick="showAuthPage('login')">← Back to Sign In</a>
        </div>
      </div>
    </div>
  </div>
