<!-- SIGNUP PAGE -->
<div id="page-signup" class="view active" style="display: block !important; width: 100%">
  <div style="display: flex; align-items: center; justify-content: center; min-height: 100vh">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">
          <span class="material-icons" style="font-size: 20px">hub</span>
        </div>
        <span class="auth-logo-text">CRM System</span>
      </div>
      <h1 class="auth-title">Create account</h1>
      <p class="auth-subtitle">Start your 14-day free trial, no card required</p>

      <form [formGroup]="signUpForm!">
        <mat-form-field appearance="outline" class="mat-full-width">
          <mat-label>Full Name</mat-label>
          <mat-icon matPrefix>person</mat-icon>
          <input matInput type="text" placeholder="John Doe" formControlName="Name" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="mat-full-width">
          <mat-label>Work Email</mat-label>
          <mat-icon matPrefix>email</mat-icon>
          <input matInput type="email" placeholder="you@company.com" formControlName="Email" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="mat-full-width">
          <mat-label>Password</mat-label>

          <mat-icon matPrefix>lock</mat-icon>
          <input matInput formControlName="Password" />
          <mat-icon matSuffix>visibility_off</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="mat-full-width">
          <mat-label>Confirm Password</mat-label>
          <mat-icon matPrefix>lock_outline</mat-icon>
          <input matInput type="password" formControlName="ConfirmPassword" />
        </mat-form-field>
      </form>

      <button class="mat-btn mat-btn-primary mat-btn-full">
        <mat-icon matPrefix>person_add</mat-icon> Create Account
      </button>
      <div class="auth-footer">
        Already have an account? <a (click)="showAuthPage()">Sign in</a>
      </div>
    </div>
  </div>
</div>
