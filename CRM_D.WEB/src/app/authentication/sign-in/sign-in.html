<!-- LOGIN PAGE -->
<div id="page-login" class="view active" style="display: block !important; width: 100%">
  <div style="display: flex; align-items: center; justify-content: center; min-height: 100vh">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">
          <span class="material-icons" style="font-size: 20px">hub</span>
        </div>
        <span class="auth-logo-text">CRM System</span>
      </div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to your account to continue</p>

      <form action="" [formGroup]="loginForm!">
        <mat-form-field appearance="outline" class="mat-full-width">
          <mat-label>User Name</mat-label>
          <input matInput type="text" formControlName="UserName" />
          <mat-icon matPrefix>person</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="mat-full-width">
          <mat-label>Password</mat-label>
          <mat-icon matPrefix>lock</mat-icon>
          <input
            matInput
            type="password"
            formControlName="Password"
            [type]="hidePassword ? 'password' : 'text'"
          />
          <mat-icon matSuffix (click)="hidePassword = !hidePassword">{{
            hidePassword ? 'visibility_off' : 'visibility'
          }}</mat-icon>
        </mat-form-field>

        <div class="auth-forgot">
          <a href="#" onclick="return false;" style="pointer-events: none; opacity: 0.5"
            >Forgot password?</a
          >
        </div>

        <label class="mat-checkbox">
          <input type="checkbox" checked />
          <span>Remember me for 30 days</span>
        </label>

        <button class="mat-btn mat-btn-primary mat-btn-full" (click)="loginBtnClick()">
          <span class="material-icons">login</span> Sign In
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a (click)="showSignUpPage()">Create account</a>
      </div>
    </div>
  </div>
</div>
